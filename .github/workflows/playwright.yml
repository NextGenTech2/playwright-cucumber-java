name: Cloud Playwright Tests
on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      
      # FIX: Install modern versions of missing libraries before Playwright
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2t64 libatk1.0-0t64 libatk-bridge2.0-0t64 libcups2t64 libglib2.0-0t64
      
      # Use this to install browsers without trying to use the broken 'with-deps'
      - name: Install Playwright Browsers
        run: npx playwright install chromium
      
      - name: Build and Test
        run: xvfb-run mvn clean test -Dplaywright.skip.browser.download=true -Dheadless=false
      
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: target/allure-results/
