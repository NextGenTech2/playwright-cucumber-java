name: Cloud Playwright Tests
on:
  push:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Install Playwright Browsers and Dependencies
        run: mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps chromium"
      
      - name: Build and Test
        run: xvfb-run mvn clean verify -Dplaywright.skip.browser.download=true -Dheadless=true
      
      - name: Test Summary
        uses: test-summary/action@v2
        with:
          paths: "**/target/failsafe-reports/TEST-*.xml"
        if: always()

      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: target/allure-results/
